name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Validate tag matches Cargo.toml version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$GITHUB_REF_NAME" --jq .body > RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --draft --verify-tag --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
    outputs:
      version: ${{ steps.version.outputs.version }}

  build-release:
    name: Build ${{ matrix.target }}
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    env:
      RUST_BACKTRACE: 1
      CARGO_INCREMENTAL: 0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Configure sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "CCACHE=sccache" >> "$GITHUB_ENV"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev \
            xvfb libegl1 libgles2 libgl1-mesa-dri mesa-utils \
            libfontconfig1 libfreetype6 libharfbuzz0b libx11-6 libxcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Bundle Windows ANGLE DLLs
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eu
          shopt -s failglob
          BIN_DIR="target/${{ matrix.target }}/release"
          cp "$BIN_DIR"/build/mozangle-*/out/libEGL.dll "$BIN_DIR"/
          cp "$BIN_DIR"/build/mozangle-*/out/libGLESv2.dll "$BIN_DIR"/

      - name: Smoke test (CLI only, no network)
        shell: bash
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.target }}/release/servo-fetch
          [[ "${{ runner.os }}" == "Windows" ]] && BIN="$BIN.exe"
          "$BIN" --version | grep -q '^servo-fetch '
          "$BIN" --help >/dev/null

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/servo-fetch

      - name: Determine archive name
        shell: bash
        run: echo "ARCHIVE=servo-fetch-v${{ needs.create-release.outputs.version }}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Build archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir "$ARCHIVE"
          cp target/${{ matrix.target }}/release/servo-fetch "$ARCHIVE"/
          cp README.md LICENSE "$ARCHIVE"/
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"

      - name: Build archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir "$ARCHIVE"
          cp target/${{ matrix.target }}/release/servo-fetch.exe "$ARCHIVE"/
          cp target/${{ matrix.target }}/release/libEGL.dll "$ARCHIVE"/
          cp target/${{ matrix.target }}/release/libGLESv2.dll "$ARCHIVE"/
          cp README.md LICENSE "$ARCHIVE"/
          7z a "$ARCHIVE.zip" "$ARCHIVE"
          certutil -hashfile "$ARCHIVE.zip" SHA256 > "$ARCHIVE.zip.sha256"

      - name: Attest build provenance (Unix)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.tar.gz

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.zip

      - name: Upload release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            gh release upload "$GITHUB_REF_NAME" "$ARCHIVE.zip" "$ARCHIVE.zip.sha256"
          else
            gh release upload "$GITHUB_REF_NAME" "$ARCHIVE.tar.gz" "$ARCHIVE.tar.gz.sha256"
          fi

  publish-release:
    name: Publish Release
    needs: [create-release, build-release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Mark release as non-draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false

  publish-crate:
    name: Publish to crates.io
    needs: [publish-release]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish to crates.io
        run: cargo publish --locked --no-verify --token ${{ steps.auth.outputs.token }}
