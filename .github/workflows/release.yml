name: Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.11.2)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.11.2)"
        required: true
        type: string

permissions: {}

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-pc-windows-msvc
            os: windows-2022
    env:
      RUST_BACKTRACE: 1
      CARGO_INCREMENTAL: 0
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CCACHE: sccache
      TARGET: ${{ matrix.target }}
      TAG: ${{ inputs.tag }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
          targets: ${{ matrix.target }}

      # zizmor: ignore[cache-poisoning] -- maintainer-controlled trigger only (release-plz-release or workflow_dispatch)
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm pkg-config libfontconfig-dev libfreetype-dev \
            libssl-dev libglib2.0-dev libegl1-mesa-dev \
            xvfb libegl1 libgles2 libgl1-mesa-dri mesa-utils \
            libfontconfig1 libfreetype6 libharfbuzz0b libx11-6 libxcb1 libxcb-render0 libxcb-shape0 libxcb-xfixes0

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: printf 'LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin\n' >> "$GITHUB_ENV"

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "$TARGET" -p servo-fetch-cli

      - name: Bundle Windows ANGLE DLLs
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eu
          shopt -s failglob
          BIN_DIR="target/$TARGET/release"
          cp "$BIN_DIR"/build/mozangle-*/out/libEGL.dll "$BIN_DIR"/
          cp "$BIN_DIR"/build/mozangle-*/out/libGLESv2.dll "$BIN_DIR"/

      - name: Smoke test (CLI only, no network)
        shell: bash
        env:
          BIN_EXT: ${{ runner.os == 'Windows' && '.exe' || '' }}
        run: |
          set -euo pipefail
          BIN="target/$TARGET/release/servo-fetch$BIN_EXT"
          "$BIN" --version | grep -q '^servo-fetch '
          "$BIN" --help >/dev/null

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: strip "target/$TARGET/release/servo-fetch"

      - name: Determine archive name
        shell: bash
        run: |
          VERSION="${TAG#v}"
          echo "ARCHIVE=servo-fetch-v${VERSION}-${TARGET}" >> "$GITHUB_ENV"

      - name: Build archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -eu
          mkdir "$ARCHIVE"
          cp "target/$TARGET/release/servo-fetch" "$ARCHIVE"/
          cp README.md LICENSE-MIT LICENSE-APACHE "$ARCHIVE"/
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"

      - name: Build archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -eu
          mkdir "$ARCHIVE"
          cp "target/$TARGET/release/servo-fetch.exe" "$ARCHIVE"/
          cp "target/$TARGET/release/libEGL.dll" "$ARCHIVE"/
          cp "target/$TARGET/release/libGLESv2.dll" "$ARCHIVE"/
          cp README.md LICENSE-MIT LICENSE-APACHE "$ARCHIVE"/
          7z a "$ARCHIVE.zip" "$ARCHIVE"
          certutil -hashfile "$ARCHIVE.zip" SHA256 > "$ARCHIVE.zip.sha256"

      - name: Attest build provenance (Unix)
        if: runner.os != 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.tar.gz

      - name: Attest build provenance (Windows)
        if: runner.os == 'Windows'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ env.ARCHIVE }}.zip

      - name: Upload release archive
        shell: bash
        env:
          ARCHIVE_EXT: ${{ runner.os == 'Windows' && 'zip' || 'tar.gz' }}
        run: |
          set -eu
          gh release upload "$TAG" "$ARCHIVE.$ARCHIVE_EXT" "$ARCHIVE.$ARCHIVE_EXT.sha256" --clobber

      - name: Upload Linux binary for docker job
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/servo-fetch
          if-no-files-found: error
          retention-days: 1

  publish-crate:
    name: Publish to crates.io
    needs: build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.95.0"
      - name: Dry-run package
        run: |
          cargo package --locked --list -p servo-fetch >/dev/null
          cargo package --locked --list -p servo-fetch-cli >/dev/null
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --workspace --locked --no-verify

  publish-docker:
    name: Publish Docker image
    needs: build-release
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      TAG: ${{ inputs.tag }}
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag }}
          persist-credentials: false

      - name: Compute version and revision
        run: |
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "REVISION=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Download Linux binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*-linux-gnu
          path: artifacts

      - name: Stage binaries for docker buildx
        run: |
          set -euo pipefail
          mkdir -p dist/amd64 dist/arm64
          cp artifacts/binary-x86_64-unknown-linux-gnu/servo-fetch dist/amd64/servo-fetch
          cp artifacts/binary-aarch64-unknown-linux-gnu/servo-fetch dist/arm64/servo-fetch
          chmod +x dist/amd64/servo-fetch dist/arm64/servo-fetch

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }}
            type=semver,pattern={{major}},value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ !contains(inputs.tag, '-') }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.REVISION }}
          provenance: mode=max
          sbom: true

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes --recursive "ghcr.io/${{ github.repository }}@${DIGEST}"

  trivy-scan:
    name: Scan Docker image
    needs: publish-docker
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ needs.publish-docker.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif
          limit-severities-for-sarif: true
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2
          TRIVY_DISABLE_VEX_NOTICE: "true"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
